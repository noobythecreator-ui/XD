name: Build Geode Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          build-config: Release
          target: Android
          
